<body class="text-ink-900">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="env,react">
  /* global React, ReactDOM, Recharts, lucide */
  const { useMemo, useState, useEffect, useRef } = React;
  const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = Recharts;

  // ---------- Lucide icon wrapper ----------
  function Icon({ name, size = 18, className = '', strokeWidth = 2 }) {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      ref.current.innerHTML = '';
      const svgNS = 'http://www.w3.org/2000/svg';
      const node = lucide.icons?.[toPascal(name)] || lucide.icons?.[name];
      if (!node) return;
      // node is [tag, attrs, children]
      const [, attrs, children] = node;
      const svg = document.createElementNS(svgNS, 'svg');
      Object.entries({ ...attrs, width: size, height: size, 'stroke-width': strokeWidth }).forEach(([k, v]) =>
        svg.setAttribute(k, v)
      );
      svg.setAttribute('class', className);
      (children || []).forEach(([t, a]) => {
        const el = document.createElementNS(svgNS, t);
        Object.entries(a).forEach(([k, v]) => el.setAttribute(k, v));
        svg.appendChild(el);
      });
      ref.current.appendChild(svg);
    }, [name, size, className, strokeWidth]);
    return <span ref={ref} className="inline-flex" aria-hidden="true" />;
  }
  function toPascal(s) {
    return s.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join('');
  }

  // ---------- helpers ----------
  const KRW = (n) => '₩' + Math.round(n).toLocaleString('ko-KR');
  const KRW_signed = (n, type) => (type === 'income' ? '+' : '-') + KRW(Math.abs(n));
  const ymKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  const parseYm = (key) => {
    const [y, m] = key.split('-').map(Number);
    return new Date(y, m - 1, 1);
  };
  const todayISO = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const fmtDate = (iso) => {
    const [y, m, d] = iso.split('-').map(Number);
    return `${m}월 ${d}일`;
  };
  const fmtWeekday = (iso) => {
    const [y, m, d] = iso.split('-').map(Number);
    return ['일','월','화','수','목','금','토'][new Date(y, m-1, d).getDay()];
  };

  // ---------- categories ----------
  const INCOME_CATS = [
    { key: '급여',   icon: 'briefcase' },
    { key: '부수입', icon: 'trending-up' },
    { key: '용돈',   icon: 'gift' },
    { key: '기타',   icon: 'more-horizontal' },
  ];
  // Each category points to a shade in the accent palette (resolved at render time)
  const EXPENSE_CATS = [
    { key: '식비',   icon: 'utensils',        shade: 500 },
    { key: '교통',   icon: 'bus',             shade: 400 },
    { key: '쇼핑',   icon: 'shopping-bag',    shade: 300 },
    { key: '주거',   icon: 'home',            shade: 600 },
    { key: '통신',   icon: 'smartphone',      shade: 700 },
    { key: '의료',   icon: 'heart-pulse',     shade: 400 },
    { key: '여가',   icon: 'gamepad-2',       shade: 200 },
    { key: '교육',   icon: 'book-open',       shade: 800 },
    { key: '기타',   icon: 'more-horizontal', shade: 100 },
  ];
  // Read palette color directly from JS (synchronous, theme-driven)
  const accentColor = (theme, shade) => {
    const p = PALETTES[theme] || PALETTES.mint;
    return `rgb(${p.scale[shade]})`;
  };
  const catMeta = (type, key) => {
    const list = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
    return list.find(c => c.key === key) || list[list.length - 1];
  };

  // ---------- sample data (anchored to current month) ----------
  function buildSampleData() {
    const now = new Date();
    const y = now.getFullYear();
    const m = now.getMonth(); // 0-indexed
    const ym = (offset) => {
      const d = new Date(y, m + offset, 1);
      return { y: d.getFullYear(), m: d.getMonth() };
    };
    const iso = (yy, mm, dd) => `${yy}-${String(mm+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const cur = ym(0), prev = ym(-1);
    let id = 1;
    const tx = (date, type, category, amount, memo) => ({
      id: id++, date, type, category, amount, memo
    });
    return [
      // current month
      tx(iso(cur.y, cur.m, 25), 'expense', '식비',   12800, '점심 백반'),
      tx(iso(cur.y, cur.m, 25), 'expense', '교통',    1500, '지하철'),
      tx(iso(cur.y, cur.m, 24), 'expense', '쇼핑',   45900, '운동화 끈'),
      tx(iso(cur.y, cur.m, 23), 'expense', '식비',    8900, '편의점 도시락'),
      tx(iso(cur.y, cur.m, 22), 'expense', '여가',   18000, '영화 1인'),
      tx(iso(cur.y, cur.m, 21), 'expense', '식비',   34500, '친구랑 저녁'),
      tx(iso(cur.y, cur.m, 20), 'expense', '통신',   55000, '휴대폰 요금'),
      tx(iso(cur.y, cur.m, 18), 'expense', '주거',  680000, '월세'),
      tx(iso(cur.y, cur.m, 17), 'expense', '의료',   15000, '감기약'),
      tx(iso(cur.y, cur.m, 15), 'expense', '식비',   23000, '장보기'),
      tx(iso(cur.y, cur.m, 12), 'expense', '교육',   89000, '온라인 강의'),
      tx(iso(cur.y, cur.m, 10), 'expense', '교통',   60000, '교통카드 충전'),
      tx(iso(cur.y, cur.m,  8), 'expense', '식비',    7200, '아침 김밥'),
      tx(iso(cur.y, cur.m,  5), 'expense', '쇼핑',  120000, '셔츠 2벌'),
      tx(iso(cur.y, cur.m,  3), 'expense', '식비',   14500, '점심 파스타'),
      tx(iso(cur.y, cur.m, 25), 'income',  '부수입', 80000, '중고 판매'),
      tx(iso(cur.y, cur.m, 10), 'income',  '용돈',  100000, '부모님'),
      tx(iso(cur.y, cur.m,  1), 'income',  '급여', 2800000, '4월 월급'),
      // previous month sample
      tx(iso(prev.y, prev.m, 28), 'expense', '식비',   45000, '저녁 외식'),
      tx(iso(prev.y, prev.m, 18), 'expense', '주거', 680000, '월세'),
      tx(iso(prev.y, prev.m,  1), 'income',  '급여', 2800000, '지난달 월급'),
    ];
  }

  // ---------- tweak defaults (rewritten on disk by host) ----------
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "amber"
  }/*EDITMODE-END*/;

  // ---------- theme palettes ----------
  const PALETTES = {
    mint: {
      label: '민트',
      swatch: '#1fbd72',
      scale: {
        50: '239 253 246', 100: '216 251 232', 200: '179 245 210',
        300: '126 234 179', 400: '70 214 143', 500: '31 189 114',
        600: '17 154 91', 700: '15 122 74', 800: '16 97 61', 900: '14 80 52',
      },
    },
    indigo: {
      label: '인디고',
      swatch: '#6366f1',
      scale: {
        50: '238 242 255', 100: '224 231 255', 200: '199 210 254',
        300: '165 180 252', 400: '129 140 248', 500: '99 102 241',
        600: '79 70 229', 700: '67 56 202', 800: '55 48 163', 900: '49 46 129',
      },
    },
    rose: {
      label: '로즈',
      swatch: '#f43f5e',
      scale: {
        50: '255 241 242', 100: '255 228 230', 200: '254 205 211',
        300: '253 164 175', 400: '251 113 133', 500: '244 63 94',
        600: '225 29 72', 700: '190 18 60', 800: '159 18 57', 900: '136 19 55',
      },
    },
    amber: {
      label: '앰버',
      swatch: '#f59e0b',
      scale: {
        50: '255 251 235', 100: '254 243 199', 200: '253 230 138',
        300: '252 211 77', 400: '251 191 36', 500: '245 158 11',
        600: '217 119 6', 700: '180 83 9', 800: '146 64 14', 900: '120 53 15',
      },
    },
    slate: {
      label: '슬레이트',
      swatch: '#475569',
      scale: {
        50: '248 250 252', 100: '241 245 249', 200: '226 232 240',
        300: '203 213 225', 400: '148 163 184', 500: '100 116 139',
        600: '71 85 105', 700: '51 65 85', 800: '30 41 59', 900: '15 23 42',
      },
    },
    plum: {
      label: '플럼',
      swatch: '#a855f7',
      scale: {
        50: '250 245 255', 100: '243 232 255', 200: '233 213 255',
        300: '216 180 254', 400: '192 132 252', 500: '168 85 247',
        600: '147 51 234', 700: '126 34 206', 800: '107 33 168', 900: '88 28 135',
      },
    },
  };
  function applyPalette(key) {
    const p = PALETTES[key];
    if (!p) return;
    const root = document.documentElement;
    Object.entries(p.scale).forEach(([k, v]) => {
      root.style.setProperty(`--accent-${k}`, v);
    });
  }

  // =========================================================
  // App
  // =========================================================
  function App() {
    const { useTweaks, TweaksPanel, TweakSection } = window;
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const theme = tweaks.theme;
    useEffect(() => { applyPalette(theme); }, [theme]);

    const [transactions, setTransactions] = useState(buildSampleData);
    const [cursor, setCursor] = useState(() => {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), 1);
    });
    const [budgets, setBudgets] = useState({}); // { 'yyyy-mm': number }
    const [budgetEditOpen, setBudgetEditOpen] = useState(false);
    const [formOpen, setFormOpen] = useState(false);
    const [editing, setEditing] = useState(null); // tx object or null
    const [selectedDate, setSelectedDate] = useState(null); // 'yyyy-mm-dd' or null
    const [tab, setTab] = useState('home'); // 'home' | 'calendar' | 'list' | 'more'

    const monthKey = ymKey(cursor);
    const monthLabel = `${cursor.getFullYear()}년 ${cursor.getMonth() + 1}월`;

    const monthTx = useMemo(() => {
      return transactions
        .filter(t => t.date.startsWith(monthKey))
        .sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : b.id - a.id));
    }, [transactions, monthKey]);

    const totals = useMemo(() => {
      let income = 0, expense = 0;
      monthTx.forEach(t => {
        if (t.type === 'income') income += t.amount;
        else expense += t.amount;
      });
      return { income, expense, balance: income - expense };
    }, [monthTx]);

    const expenseByCat = useMemo(() => {
      const map = new Map();
      monthTx.filter(t => t.type === 'expense').forEach(t => {
        map.set(t.category, (map.get(t.category) || 0) + t.amount);
      });
      const arr = [...map.entries()].map(([name, value]) => ({
        name,
        value,
        color: accentColor(theme, catMeta('expense', name).shade),
      }));
      arr.sort((a,b) => b.value - a.value);
      return arr;
    }, [monthTx, theme]);

    const budget = budgets[monthKey] ?? 1500000;
    const budgetPct = budget > 0 ? Math.min(999, (totals.expense / budget) * 100) : 0;
    const overBudget = totals.expense > budget && budget > 0;

    // --- group by date for the list ---
    const groupedByDate = useMemo(() => {
      const groups = new Map();
      monthTx.forEach(t => {
        if (!groups.has(t.date)) groups.set(t.date, []);
        groups.get(t.date).push(t);
      });
      return [...groups.entries()];
    }, [monthTx]);

    // --- daily totals for calendar ---
    const dailyTotals = useMemo(() => {
      const map = new Map(); // 'yyyy-mm-dd' -> { income, expense }
      monthTx.forEach(t => {
        const cur = map.get(t.date) || { income: 0, expense: 0 };
        if (t.type === 'income') cur.income += t.amount; else cur.expense += t.amount;
        map.set(t.date, cur);
      });
      return map;
    }, [monthTx]);

    // Clear selected date when changing month
    useEffect(() => { setSelectedDate(null); }, [monthKey]);

    // Filtered list when a calendar date is selected
    const visibleGroups = useMemo(() => {
      if (!selectedDate) return groupedByDate;
      return groupedByDate.filter(([date]) => date === selectedDate);
    }, [groupedByDate, selectedDate]);

    // --- handlers ---
    const moveMonth = (delta) => {
      setCursor(d => new Date(d.getFullYear(), d.getMonth() + delta, 1));
    };
    const upsertTx = (tx) => {
      if (tx.id) {
        setTransactions(prev => prev.map(t => t.id === tx.id ? tx : t));
      } else {
        const newId = Math.max(0, ...transactions.map(t => t.id)) + 1;
        setTransactions(prev => [{ ...tx, id: newId }, ...prev]);
      }
      setEditing(null);
      setFormOpen(false);
    };
    const removeTx = (id) => {
      setTransactions(prev => prev.filter(t => t.id !== id));
      if (editing?.id === id) setEditing(null);
    };
    const startEdit = (tx) => {
      setEditing(tx);
      setFormOpen(true);
      setTab('list');
      // smooth scroll to top of form
      setTimeout(() => {
        document.getElementById('entry-form')?.scrollIntoView?.({ behavior: 'smooth', block: 'start' });
      }, 0);
    };

    const switchTab = (next) => {
      if (next !== 'calendar') setSelectedDate(null);
      setTab(next);
      setFormOpen(false);
      setEditing(null);
      window.scrollTo({ top: 0, behavior: 'instant' });
    };

    return (
      <div className="min-h-screen pb-32">
        <div className="mx-auto max-w-md px-4 sm:px-6">
          <Header
            monthLabel={monthLabel}
            onPrev={() => moveMonth(-1)}
            onNext={() => moveMonth(+1)}
            onToday={() => setCursor(new Date(new Date().getFullYear(), new Date().getMonth(), 1))}
            tab={tab}
          />

          {/* ───── HOME ───── */}
          {tab === 'home' && (
            <div className="space-y-3 anim-slidedown">
              <SummaryCards totals={totals} />
              <BudgetCard
                budget={budget}
                spent={totals.expense}
                pct={budgetPct}
                over={overBudget}
                editing={budgetEditOpen}
                onEdit={() => setBudgetEditOpen(true)}
                onCancel={() => setBudgetEditOpen(false)}
                onSave={(v) => {
                  setBudgets(prev => ({ ...prev, [monthKey]: v }));
                  setBudgetEditOpen(false);
                }}
              />
              <DonutCard data={expenseByCat} total={totals.expense} />
              <RecentList
                groups={groupedByDate.slice(0, 3)}
                onSeeAll={() => setTab('list')}
                empty={groupedByDate.length === 0}
              />
            </div>
          )}

          {/* ───── CALENDAR ───── */}
          {tab === 'calendar' && (
            <div className="space-y-3 anim-slidedown">
              <SummaryCards totals={totals} compact />
              <CalendarCard
                cursor={cursor}
                dailyTotals={dailyTotals}
                selectedDate={selectedDate}
                onSelectDate={setSelectedDate}
              />
              {selectedDate && (
                <TransactionList
                  groups={visibleGroups}
                  onEdit={startEdit}
                  onDelete={removeTx}
                  monthLabel={monthLabel}
                  selectedDate={selectedDate}
                  onClearDate={() => setSelectedDate(null)}
                  hideHeading
                />
              )}
            </div>
          )}

          {/* ───── LIST ───── */}
          {tab === 'list' && (
            <div className="space-y-3 anim-slidedown">
              <SummaryCards totals={totals} compact />
              <FormToggle
                open={formOpen}
                editing={!!editing}
                onToggle={() => {
                  if (formOpen && editing) setEditing(null);
                  setFormOpen(o => !o);
                }}
              />
              {formOpen && (
                <EntryForm
                  key={editing?.id || 'new'}
                  initial={editing}
                  defaultDate={selectedDate || todayISO()}
                  onSubmit={upsertTx}
                  onCancel={() => { setEditing(null); setFormOpen(false); }}
                />
              )}
              <TransactionList
                groups={visibleGroups}
                onEdit={startEdit}
                onDelete={removeTx}
                monthLabel={monthLabel}
                selectedDate={selectedDate}
                onClearDate={() => setSelectedDate(null)}
              />
            </div>
          )}

          {/* ───── MORE ───── */}
          {tab === 'more' && (
            <div className="anim-slidedown">
              <MorePage
                budget={budget}
                onSaveBudget={(v) => setBudgets(prev => ({ ...prev, [monthKey]: v }))}
                theme={theme}
                onSetTheme={(v) => setTweak('theme', v)}
                txCount={transactions.length}
                monthLabel={monthLabel}
              />
            </div>
          )}
        </div>

        {/* Floating add button — hide on More tab */}
        {tab !== 'more' && !formOpen && (
          <button
            onClick={() => {
              setEditing(null);
              setFormOpen(true);
              setTab('list');
              setTimeout(() => {
                document.getElementById('entry-form')?.scrollIntoView?.({ behavior: 'smooth', block: 'start' });
              }, 50);
            }}
            className="fixed bottom-[88px] right-6 sm:right-[max(1.5rem,calc(50vw-220px))] z-30 inline-flex items-center gap-2 rounded-full bg-mint-500 px-5 py-3.5 text-white shadow-lg shadow-mint-500/30 active:scale-95 transition"
          >
            <Icon name="plus" size={18} strokeWidth={2.5} />
            <span className="text-sm font-semibold">내역 추가</span>
          </button>
        )}

        {/* Bottom tab bar */}
        <BottomTabs value={tab} onChange={switchTab} />

        <TweaksPanel title="Tweaks">
          <TweakSection label="테마 색상" />

  // ---------- Calendar card ----------
  function CalendarCard({ cursor, dailyTotals, selectedDate, onSelectDate }) {
    const year = cursor.getFullYear();
    const month = cursor.getMonth(); // 0-indexed
    const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    // Pad to align with Sunday-start week
    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push({ d, iso, totals: dailyTotals.get(iso) });
    }
    while (cells.length % 7 !== 0) cells.push(null);

    const todayStr = todayISO();
    const isToday = (iso) => iso === todayStr;

    return (
      <section className="mt-3 bg-white rounded-2xl border border-ink-100 shadow-soft p-3">
        {/* Weekday header */}
        <div className="grid grid-cols-7 gap-1 px-1 pb-1.5">
          {['일','월','화','수','목','금','토'].map((w, i) => (
            <div
              key={w}
              className={`text-[10px] font-semibold text-center py-1 ${
                i === 0 ? 'text-rose-500' : i === 6 ? 'text-blue-500' : 'text-ink-400'
              }`}
            >
              {w}
            </div>
          ))}
        </div>
        {/* Days grid */}
        <div className="grid grid-cols-7 gap-1">
          {cells.map((c, idx) => {
            if (!c) return <div key={idx} className="aspect-[1/1.05]" />;
            const dow = (firstDow + c.d - 1) % 7;
            const totals = c.totals;
            const selected = selectedDate === c.iso;
            const today = isToday(c.iso);
            return (
              <button
                key={c.iso}
                type="button"
                onClick={() => onSelectDate(selected ? null : c.iso)}
                className={`group aspect-[1/1.05] rounded-lg p-1 text-left flex flex-col transition active:scale-95 ${
                  selected
                    ? 'bg-mint-500 text-white shadow-sm shadow-mint-500/30'
                    : 'hover:bg-ink-50 border border-transparent'
                } ${today && !selected ? 'border-mint-300' : ''}`}
              >
                <div className="flex items-center justify-between">
                  <span className={`text-[11px] font-bold tnum ${
                    selected ? 'text-white'
                    : dow === 0 ? 'text-rose-500'
                    : dow === 6 ? 'text-blue-500'
                    : 'text-ink-700'
                  }`}>
                    {c.d}
                  </span>
                  {today && !selected && (
                    <span className="h-1 w-1 rounded-full bg-mint-500" />
                  )}
                </div>
                {totals ? (
                  <div className="mt-auto space-y-0.5 leading-tight">
                    {totals.income > 0 && (
                      <div className={`text-[8.5px] tnum truncate font-semibold ${selected ? 'text-white/95' : 'text-blue-600'}`}>
                        +{compactKRW(totals.income)}
                      </div>
                    )}
                    {totals.expense > 0 && (
                      <div className={`text-[8.5px] tnum truncate font-semibold ${selected ? 'text-white/90' : 'text-rose-600'}`}>
                        −{compactKRW(totals.expense)}
                      </div>
                    )}
                  </div>
                ) : null}
              </button>
            );
          })}
        </div>
        {/* Legend */}
        <div className="mt-2.5 flex items-center justify-center gap-4 text-[10px] text-ink-400 font-medium">
          <span className="inline-flex items-center gap-1"><span className="h-1.5 w-1.5 rounded-full bg-blue-500" /> 수입</span>
          <span className="inline-flex items-center gap-1"><span className="h-1.5 w-1.5 rounded-full bg-rose-500" /> 지출</span>
          <span className="inline-flex items-center gap-1"><span className="h-1.5 w-1.5 rounded-full border border-mint-400" /> 오늘</span>
        </div>
      </section>
    );
  }

  // Compact KRW for tight cells: 12,800 → 1.3만, 680,000 → 68만, 2,800,000 → 280만
  function compactKRW(n) {
    n = Math.round(Math.abs(n));
    if (n >= 100000000) return (n / 100000000).toFixed(1).replace(/\.0$/, '') + '억';
    if (n >= 10000) {
      const v = n / 10000;
      return (v >= 100 ? Math.round(v) : v.toFixed(1).replace(/\.0$/, '')) + '만';
    }
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + '천';
    return String(n);
  }

  // ---------- Form toggle ----------
  function FormToggle({ open, editing, onToggle }) {
    return (
      <div className="mt-5 flex items-center justify-between">
        <h2 className="text-[13px] font-bold uppercase tracking-[0.14em] text-ink-500">
          {editing ? '내역 수정' : '새 내역'}
        </h2>
        <button
          onClick={onToggle}
          className="inline-flex items-center gap-1.5 text-[12px] font-medium text-ink-500 hover:text-mint-600 px-2 py-1 rounded-lg transition"
        >
          {open ? '접기' : '펴기'}
          <Icon name={open ? 'chevron-up' : 'chevron-down'} size={14} />
        </button>
      </div>
    );
  }

  // ---------- Entry form ----------
  function EntryForm({ initial, defaultDate, onSubmit, onCancel }) {
    const [type, setType] = useState(initial?.type || 'expense');
    const [date, setDate] = useState(initial?.date || defaultDate);
    const [amount, setAmount] = useState(initial?.amount ?? '');
    const [category, setCategory] = useState(
      initial?.category || (initial?.type === 'income' ? '급여' : '식비')
    );
    const [memo, setMemo] = useState(initial?.memo || '');
    const [error, setError] = useState('');

    // when type changes, reset category to first of that type if needed
    useEffect(() => {
      const list = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
      if (!list.find(c => c.key === category)) setCategory(list[0].key);
    }, [type]); // eslint-disable-line

    const cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;

    const submit = (e) => {
      e.preventDefault();
      const num = Number(amount);
      if (!date) return setError('날짜를 입력하세요');
      if (!num || num <= 0) return setError('금액을 0보다 큰 수로 입력하세요');
      setError('');
      onSubmit({
        id: initial?.id,
        date,
        type,
        category,
        amount: Math.round(num),
        memo: memo.trim(),
      });
    };

    return (
      <form
        id="entry-form"
        onSubmit={submit}
        className="mt-2 bg-white rounded-2xl border border-ink-100 shadow-soft p-4 anim-slidedown"
      >
        {/* Type switch */}
        <div className="grid grid-cols-2 bg-ink-50 rounded-xl p-1 text-[13px] font-semibold">
          <button
            type="button"
            onClick={() => setType('expense')}
            className={`py-2 rounded-lg transition ${type === 'expense' ? 'bg-white shadow-sm text-rose-600' : 'text-ink-400'}`}
          >
            지출
          </button>
          <button
            type="button"
            onClick={() => setType('income')}
            className={`py-2 rounded-lg transition ${type === 'income' ? 'bg-white shadow-sm text-blue-600' : 'text-ink-400'}`}
          >
            수입
          </button>
        </div>

        {/* Amount */}
        <div className="mt-4">
          <label className="text-[11px] font-semibold uppercase tracking-wider text-ink-400">금액</label>
          <div className="mt-1 relative">
            <span className={`absolute left-4 top-1/2 -translate-y-1/2 text-[20px] font-bold ${type === 'income' ? 'text-blue-500' : 'text-rose-500'}`}>₩</span>
            <input
              type="number"
              inputMode="numeric"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              placeholder="0"
              className="w-full rounded-xl border border-ink-200 bg-white pl-10 pr-3 py-3 text-[22px] font-bold tnum text-ink-900 focus:border-mint-500 focus:outline-none focus:ring-2 focus:ring-mint-200"
            />
            {amount > 0 && (
              <div className="mt-1 text-[11px] text-ink-400 tnum pl-1">{KRW(Number(amount))}</div>
            )}
          </div>
        </div>

        {/* Date */}
        <div className="mt-3">
          <label className="text-[11px] font-semibold uppercase tracking-wider text-ink-400">날짜</label>
          <input
            type="date"
            value={date}
            onChange={(e) => setDate(e.target.value)}
            className="mt-1 w-full rounded-xl border border-ink-200 bg-white px-3 py-2.5 text-[14px] tnum focus:border-mint-500 focus:outline-none focus:ring-2 focus:ring-mint-200"
          />
        </div>

        {/* Category */}
        <div className="mt-3">
          <label className="text-[11px] font-semibold uppercase tracking-wider text-ink-400">카테고리</label>
          <div className="mt-2 grid grid-cols-4 gap-1.5">
            {cats.map(c => {
              const active = category === c.key;
              return (
                <button
                  key={c.key}
                  type="button"
                  onClick={() => setCategory(c.key)}
                  className={`flex flex-col items-center gap-1 py-2.5 rounded-xl border transition ${
                    active
                      ? 'border-mint-500 bg-mint-50 text-mint-700'
                      : 'border-ink-100 bg-white text-ink-500 hover:border-ink-200'
                  }`}
                >
                  <Icon name={c.icon} size={16} strokeWidth={active ? 2.4 : 2} />
                  <span className="text-[11px] font-medium">{c.key}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Memo */}
        <div className="mt-3">
          <label className="text-[11px] font-semibold uppercase tracking-wider text-ink-400">메모</label>
          <input
            type="text"
            value={memo}
            onChange={(e) => setMemo(e.target.value)}
            placeholder="예: 점심 백반"
            maxLength={40}
            className="mt-1 w-full rounded-xl border border-ink-200 bg-white px-3 py-2.5 text-[14px] focus:border-mint-500 focus:outline-none focus:ring-2 focus:ring-mint-200"
          />
        </div>

        {error && (
          <div className="mt-3 text-[12px] text-rose-600 flex items-center gap-1.5">
            <Icon name="alert-circle" size={14} /> {error}
          </div>
        )}

        <div className="mt-4 flex gap-2">
          <button
            type="button"
            onClick={onCancel}
            className="flex-1 py-3 rounded-xl bg-ink-100 text-ink-700 text-sm font-semibold hover:bg-ink-200 active:scale-95 transition"
          >
            취소
          </button>
          <button
            type="submit"
            className="flex-[1.5] py-3 rounded-xl bg-mint-500 text-white text-sm font-semibold hover:bg-mint-600 active:scale-95 transition shadow-sm shadow-mint-500/30"
          >
            {initial ? '저장' : '추가'}
          </button>
        </div>
      </form>
    );
  }

  // ---------- Transaction list ----------
  function TransactionList({ groups, onEdit, onDelete, monthLabel, selectedDate, onClearDate, hideHeading }) {
    return (
      <section className={hideHeading ? '' : 'mt-6'}>
        {!hideHeading && (
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2">
            <h2 className="text-[13px] font-bold uppercase tracking-[0.14em] text-ink-500">거래 내역</h2>
            {selectedDate && (
              <button
                onClick={onClearDate}
                className="inline-flex items-center gap-1 text-[11px] font-semibold text-mint-700 bg-mint-50 hover:bg-mint-100 px-2 py-0.5 rounded-full transition"
              >
                {fmtDate(selectedDate)} ({fmtWeekday(selectedDate)})
                <Icon name="x" size={11} strokeWidth={2.6} />
              </button>
            )}
          </div>
          <span className="text-[11px] text-ink-400 tnum">
            {groups.reduce((acc, [, list]) => acc + list.length, 0)}건
          </span>
        </div>
        )}

        {groups.length === 0 ? (
          <div className="bg-white rounded-2xl border border-ink-100 shadow-soft py-12 text-center">
            <div className="mx-auto h-14 w-14 rounded-full bg-mint-50 grid place-items-center">
              <Icon name="notebook-pen" size={22} className="text-mint-600" />
            </div>
            <div className="mt-3 text-[14px] font-semibold text-ink-900">
              {selectedDate ? `${fmtDate(selectedDate)} 내역이 없어요` : `${monthLabel} 내역이 비었어요`}
            </div>
            <div className="mt-1 text-[12px] text-ink-500">아래 + 버튼으로 첫 내역을 추가해보세요</div>
          </div>
        ) : (
          <div className="space-y-2">
            {groups.map(([date, items]) => {
              const dayTotal = items.reduce((acc, t) => acc + (t.type === 'income' ? t.amount : -t.amount), 0);
              return (
                <div key={date} className="bg-white rounded-2xl border border-ink-100 shadow-soft overflow-hidden">
                  <div className="flex items-center justify-between px-4 pt-3 pb-1.5">
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-[13px] font-bold text-ink-900">{fmtDate(date)}</span>
                      <span className="text-[11px] text-ink-400 font-medium">({fmtWeekday(date)})</span>
                    </div>
                    <span className={`text-[11px] tnum font-semibold ${dayTotal >= 0 ? 'text-mint-700' : 'text-ink-400'}`}>
                      {dayTotal >= 0 ? '+' : '−'}{KRW(Math.abs(dayTotal))}
                    </span>
                  </div>
                  <ul className="divide-y divide-ink-100">
                    {items.map(t => <TxRow key={t.id} tx={t} onEdit={onEdit} onDelete={onDelete} />)}
                  </ul>
                </div>
              );
            })}
          </div>
        )}
      </section>
    );
  }

  function TxRow({ tx, onEdit, onDelete }) {
    const [open, setOpen] = useState(false);
    const meta = catMeta(tx.type, tx.category);
    const isIncome = tx.type === 'income';
    return (
      <li>
        <button
          type="button"
          onClick={() => setOpen(o => !o)}
          className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-ink-50/60 active:bg-ink-100 transition"
        >
          <div
            className={`h-10 w-10 rounded-xl grid place-items-center flex-shrink-0 ${
              isIncome ? 'bg-blue-50 text-blue-600' : 'bg-mint-50 text-mint-700'
            }`}
          >
            <Icon name={meta.icon} size={17} />
          </div>
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-1.5">
              <span className="text-[13px] font-semibold text-ink-900 truncate">
                {tx.memo || tx.category}
              </span>
            </div>
            <div className="text-[11px] text-ink-400 mt-0.5">
              {tx.category}
            </div>
          </div>
          <div className={`text-[14px] font-bold tnum flex-shrink-0 ${isIncome ? 'text-blue-600' : 'text-rose-600'}`}>
            {KRW_signed(tx.amount, tx.type)}
          </div>
        </button>
        {open && (
          <div className="px-4 pb-3 -mt-1 flex gap-2 anim-slidedown">
            <button
              onClick={() => onEdit(tx)}
              className="flex-1 inline-flex items-center justify-center gap-1.5 py-2 rounded-lg bg-ink-100 hover:bg-ink-200 text-ink-700 text-[12px] font-semibold transition"
            >
              <Icon name="pencil" size={13} /> 수정
            </button>
            <button
              onClick={() => {
                if (window.confirm('이 내역을 삭제할까요?')) onDelete(tx.id);
              }}
              className="flex-1 inline-flex items-center justify-center gap-1.5 py-2 rounded-lg bg-rose-50 hover:bg-rose-100 text-rose-600 text-[12px] font-semibold transition"
            >
              <Icon name="trash-2" size={13} /> 삭제
            </button>
          </div>
        )}
      </li>
    );
  }

  // ---------- mount ----------
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
